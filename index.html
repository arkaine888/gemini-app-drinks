<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶小舖 - 免登入點餐系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 🔹 假資料版本，不用 Firebase
        const BEVERAGES = [
            { id: 101, name: '仙芋見泥', price: 75, icon: '🍠', category: '冬季限定' },
            { id: 102, name: '芋泥奶奶', price: 75, icon: '🥛', category: '冬季限定' },
            { id: 201, name: '綠茶好亮', price: 55, icon: '🥭', category: '私房特調' },
            { id: 301, name: '哞³-清爽版', price: 69, icon: '🐄', category: '喫茶必喝' },
            { id: 401, name: '桂花烏龍蜜', price: 60, icon: '🐝', category: '100% 蜂蜜' }
        ];
        const CATEGORIES = ['冬季限定', '私房特調', '喫茶必喝', '100% 蜂蜜'];
        const SWEETNESS_LEVELS = ['正常', '完美', '標準', '微糖', '油切'];
        const ICE_LEVELS = ['多冰', '正常', '少冰', '少少冰', '去冰'];
        const TOPPINGS = [
            { name: '無', price: 0 }, 
            { name: '黑糖珍珠', price: 10 }, 
            { name: '小麥可可脆球', price: 10 }
        ];

        const Icon = ({ name, size = 24 }) => {
            const icons = {
                coffee: <path d="M17 8h1a4 4 0 1 1 0 8h-1M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z M6 2v2 M10 2v2 M14 2v2" />,
                xCircle: <React.Fragment><circle cx="12" cy="12" r="10" /><path d="m15 9-6 6M9 9l6 6" /></React.Fragment>,
                hand: <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M14 10V4a2 2 0 0 0-2-2v0 M10 10.5V6a2 2 0 0 0-2-2v0" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [nickname, setNickname] = useState('');
            const [selectedDrink, setSelectedDrink] = useState(null);
            const [activeCategory, setActiveCategory] = useState(CATEGORIES[0]);
            const [customization, setCustomization] = useState({ sweetness: '完美', ice: '少冰', topping: '無', quantity: 1 });
            const [orders, setOrders] = useState([]);

            const scrollRef = useRef(null);
            const [dragState, setDragState] = useState({ isDragging: false, startX: 0, scrollLeft: 0, moved: false });

            const handleMouseDown = (e) => setDragState({ isDragging: true, startX: e.pageX - scrollRef.current.offsetLeft, scrollLeft: scrollRef.current.scrollLeft, moved: false });
            const handleMouseMove = (e) => {
                if (!dragState.isDragging) return;
                const walk = (e.pageX - scrollRef.current.offsetLeft - dragState.startX);
                if (Math.abs(walk) > 5) setDragState(prev => ({ ...prev, moved: true }));
                scrollRef.current.scrollLeft = dragState.scrollLeft - walk;
            };
            const handleMouseUp = () => setDragState(prev => ({ ...prev, isDragging: false }));

            const handleSubmitOrder = () => {
                if (!nickname.trim()) { alert("請先輸入暱稱"); return; }
                if (!selectedDrink) return;
                const toppingPrice = TOPPINGS.find(t => t.name === customization.topping)?.price || 0;
                const newOrder = {
                    id: Date.now(),
                    nickname: nickname.trim(),
                    name: selectedDrink.name,
                    finalPrice: selectedDrink.price + toppingPrice,
                    ...customization
                };
                setOrders([...orders, newOrder]);
                setSelectedDrink(null);
                setCustomization({ sweetness: '完美', ice: '少冰', topping: '無', quantity: 1 });
            };

            const grandTotal = orders.reduce((sum, o) => sum + (o.finalPrice * o.quantity), 0);

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto space-y-8 animate-fade-in">
                    <header className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <h1 className="text-xl font-black italic text-slate-800">喫茶小舖 光輝店</h1>
                        <input className="w-full mt-4 p-4 rounded-2xl border" placeholder="暱稱" value={nickname} onChange={e => setNickname(e.target.value)} />
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        {/* Menu */}
                        <div className="space-y-6">
                            <div ref={scrollRef} onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} className="flex gap-2 overflow-x-auto no-scrollbar pb-2 select-none">
                                {CATEGORIES.map(cat => (
                                    <button key={cat} onClick={() => !dragState.moved && setActiveCategory(cat)} className={`px-6 py-2 rounded-2xl ${activeCategory === cat ? 'bg-green-700 text-white' : 'bg-white'}`}>{cat}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                {BEVERAGES.filter(b => b.category === activeCategory).map(drink => (
                                    <button key={drink.id} onClick={() => setSelectedDrink(drink)} className="p-4 rounded-3xl bg-white border text-left h-32 flex flex-col justify-between">
                                        <span className="text-3xl">{drink.icon}</span>
                                        <div>
                                            <p className="text-sm font-black">{drink.name}</p>
                                            <p className="text-green-700 font-black">${drink.price}</p>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Customization */}
                        <div className="lg:sticky lg:top-8 h-fit">
                            {selectedDrink && (
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                                    <h2 className="text-2xl font-black mb-4">{selectedDrink.name}</h2>
                                    <div className="space-y-4">
                                        <div>
                                            <p>甜度</p>
                                            <div className="flex gap-2">{SWEETNESS_LEVELS.map(l => <button key={l} onClick={() => setCustomization({...customization, sweetness: l})} className={`${customization.sweetness===l?'bg-slate-800 text-white':'bg-slate-50'}`}>{l}</button>)}</div>
                                        </div>
                                        <div>
                                            <p>冰量</p>
                                            <div className="flex gap-2">{ICE_LEVELS.map(l => <button key={l} onClick={() => setCustomization({...customization, ice: l})} className={`${customization.ice===l?'bg-slate-800 text-white':'bg-slate-50'}`}>{l}</button>)}</div>
                                        </div>
                                        <div>
                                            <p>加料</p>
                                            <div className="flex gap-2">{TOPPINGS.map(t => <button key={t.name} onClick={() => setCustomization({...customization, topping: t.name})} className={`${customization.topping===t.name?'bg-green-700 text-white':'bg-slate-50'}`}>{t.name}</button>)}</div>
                                        </div>
                                    </div>
                                    <div className="mt-4">
                                        <button onClick={handleSubmitOrder} className="bg-green-700 text-white px-6 py-3 rounded-xl">加入清單</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Orders */}
                    <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                        <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                            <h2 className="text-xl font-black">點餐清單</h2>
                            <p className="text-green-400 font-black">${grandTotal}</p>
                        </div>
                        <div className="divide-y divide-slate-50 max-h-[300px] overflow-y-auto no-scrollbar">
                            {orders.map(o => (
                                <div key={o.id} className="p-4 flex justify-between items-center">
                                    <div>{o.nickname} - {o.name} x{o.quantity}</div>
                                    <div>${o.finalPrice*o.quantity}</div>
                                </div>
                            ))}
                            {orders.length===0 && <div className="p-4 text-center text-slate-400">還沒有人點餐</div>}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
