<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫茶小舖 - 免登入點餐系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs (Compat version for stability) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Firebase 初始化與配置
        const firebaseConfig = JSON.parse(__firebase_config);
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'beverage-order-system-default';

        // 穩定版 SVG 圖標組件 - 解決 removeChild BUG
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                coffee: <path d="M17 8h1a4 4 0 1 1 0 8h-1M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z M6 2v2 M10 2v2 M14 2v2" />,
                trash: <path d="M3 6h18 M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6 M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2 M10 11v6 M14 11v6" />,
                hand: <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0 M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15" />,
                xCircle: <React.Fragment><circle cx="12" cy="12" r="10" /><path d="m15 9-6 6M9 9l6 6" /></React.Fragment>
            };
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const BEVERAGES = [
            { id: 101, name: '仙芋見泥', price: 75, icon: '🍠', category: '冬季限定' },
            { id: 102, name: '芋泥奶奶', price: 75, icon: '🥛', category: '冬季限定' },
            { id: 103, name: '芋泥波波', price: 75, icon: '🍡', category: '冬季限定' },
            { id: 104, name: '黑糖薑茶', price: 45, icon: '🍵', category: '冬季限定' },
            { id: 105, name: '薑汁撞奶', price: 55, icon: '🥛', category: '冬季限定' },
            { id: 106, name: '薑汁歐蕾', price: 60, icon: '☕', category: '冬季限定' },
            { id: 107, name: '薑汁仙甘', price: 48, icon: '🌿', category: '冬季限定' },
            { id: 108, name: '薑汁燒仙草', price: 55, icon: '🥣', category: '冬季限定' },
            { id: 201, name: '綠茶好亮/青茶好亮', price: 55, icon: '🥭', category: '私房特調' },
            { id: 202, name: '香橙茉綠/百香茉綠', price: 55, icon: '🍊', category: '私房特調' },
            { id: 203, name: '香橙多多/百香多多', price: 60, icon: '🍹', category: '私房特調' },
            { id: 204, name: '蜜桃桂花烏龍', price: 55, icon: '🍑', category: '私房特調' },
            { id: 205, name: '茉綠多多', price: 55, icon: '🧪', category: '私房特調' },
            { id: 206, name: '翡翠檸檬綠', price: 60, icon: '🍋', category: '私房特調' },
            { id: 207, name: '初見青梅', price: 50, icon: '🟢', category: '私房特調' },
            { id: 301, name: '哞³-清爽版', price: 69, icon: '🐄', category: '喫茶必喝' },
            { id: 302, name: '哞³-重乳版', price: 69, icon: '🍼', category: '喫茶必喝' },
            { id: 303, name: '重乳咖紅', price: 60, icon: '☕', category: '喫茶必喝' },
            { id: 304, name: '重乳烏龍', price: 60, icon: '🍵', category: '喫茶必喝' },
            { id: 305, name: '阿君珍珠奶茶', price: 50, icon: '🧋', category: '喫茶必喝' },
            { id: 306, name: '黑糖波波鮮奶', price: 60, icon: '🍯', category: '喫茶必喝' },
            { id: 307, name: '黑哞', price: 65, icon: '🐂', category: '喫茶必喝' },
            { id: 401, name: '桂花烏龍蜜', price: 60, icon: '🐝', category: '100% 蜂蜜' },
            { id: 402, name: '琥珀桂花蜜', price: 65, icon: '🌼', category: '100% 蜂蜜' },
            { id: 403, name: '初見青梅蜜', price: 65, icon: '🍯', category: '100% 蜂蜜' },
            { id: 404, name: '蜂蜜檸檬', price: 75, icon: '🍋', category: '100% 蜂蜜' },
            { id: 501, name: '仙草甘茶', price: 40, icon: '🌿', category: '復刻風味' },
            { id: 502, name: '嫩仙草甘茶', price: 45, icon: '🍃', category: '復刻風味' },
            { id: 503, name: '復刻冬瓜', price: 40, icon: '🧊', category: '復刻風味' },
            { id: 504, name: '冬瓜檸檬', price: 60, icon: '🍋', category: '復刻風味' },
            { id: 505, name: '冰淇淋紅茶', price: 55, icon: '🍦', category: '復刻風味' },
            { id: 601, name: '牛奶糖奶蓋茶', price: 60, icon: '☁️', category: '奶茶系列' },
            { id: 602, name: '珍珠烏瓦奶茶', price: 55, icon: '🧋', category: '奶茶系列' },
            { id: 603, name: '烏瓦奶茶', price: 55, icon: '🥤', category: '奶茶系列' },
            { id: 604, name: '琥珀桂花奶茶', price: 60, icon: '🍂', category: '奶茶系列' },
            { id: 605, name: '韻焙烏龍歐蕾', price: 65, icon: '🥛', category: '奶茶系列' },
            { id: 606, name: '嫩仙草紅茶歐蕾', price: 70, icon: '🥣', category: '奶茶系列' },
            { id: 701, name: '桂花烏龍', price: 35, icon: '🍵', category: '原葉手煮茶' },
            { id: 702, name: '韻焙烏龍', price: 35, icon: '🌿', category: '原葉手煮茶' },
            { id: 703, name: '經典咖啡紅茶', price: 35, icon: '🏺', category: '原葉手煮茶' },
            { id: 704, name: '青山茉綠', price: 35, icon: '🌱', category: '原葉手煮茶' },
            { id: 705, name: '文山青茶', price: 35, icon: '🍃', category: '原葉手煮茶' },
            { id: 706, name: '烏瓦莊園紅茶', price: 35, icon: '🏰', category: '原葉手煮茶' }
        ];

        const CATEGORIES = ['冬季限定', '私房特調', '喫茶必喝', '100% 蜂蜜', '復刻風味', '奶茶系列', '原葉手煮茶'];
        const SWEETNESS_LEVELS = ['正常', '完美', '標準', '微糖', '油切'];
        const ICE_LEVELS = ['多冰', '正常', '少冰', '少少冰', '去冰'];
        const TOPPINGS = [
            { name: '無', price: 0 }, 
            { name: '小麥可可脆球', price: 10 }, 
            { name: '黑糖珍珠', price: 10 }, 
            { name: '迷你黑糖珍珠', price: 10 },
            { name: '嫩仙草凍', price: 10 },
            { name: '島嶼椰果', price: 10 },
            { name: '纖果', price: 10 },
            { name: '琥珀Q凍', price: 10 }
        ];

        const App = () => {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [nickname, setNickname] = useState('');
            const [selectedDrink, setSelectedDrink] = useState(null);
            const [activeCategory, setActiveCategory] = useState('喫茶必喝');
            const [customization, setCustomization] = useState({ sweetness: '完美', ice: '少冰', topping: '無', quantity: 1 });
            const [isSubmitting, setIsSubmitting] = useState(false);

            const scrollRef = useRef(null);
            const [dragState, setDragState] = useState({ isDragging: false, startX: 0, scrollLeft: 0, moved: false });

            // 1. Firebase 認證初始化
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) { console.error("Firebase Auth Error:", err); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            // 2. 訂單即時監聽 (含錯誤處理)
            useEffect(() => {
                if (!user) return;
                const ordersRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders');
                const unsubscribe = ordersRef.onSnapshot(
                    snapshot => {
                        const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        docs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                        setOrders(docs);
                    }, 
                    error => {
                        console.error("Firestore Subscription Error:", error);
                    }
                );
                return () => unsubscribe();
            }, [user]);

            // 3. 滑動處理邏輯修正
            const handleMouseDown = (e) => {
                setDragState({
                    isDragging: true,
                    startX: e.pageX - scrollRef.current.offsetLeft,
                    scrollLeft: scrollRef.current.scrollLeft,
                    moved: false
                });
            };

            const handleMouseMove = (e) => {
                if (!dragState.isDragging) return;
                const x = e.pageX - scrollRef.current.offsetLeft;
                const walk = (x - dragState.startX);
                if (Math.abs(walk) > 5) {
                    setDragState(prev => ({ ...prev, moved: true }));
                }
                scrollRef.current.scrollLeft = dragState.scrollLeft - walk;
            };

            const handleMouseUp = () => setDragState(prev => ({ ...prev, isDragging: false }));

            // 4. 提交訂單
            const handleSubmitOrder = async () => {
                if (!nickname.trim()) {
                    alert("請先輸入您的暱稱喔！");
                    return;
                }
                if (!user) return;
                setIsSubmitting(true);
                try {
                    const toppingItem = TOPPINGS.find(t => t.name === customization.topping);
                    const toppingPrice = toppingItem ? toppingItem.price : 0;
                    
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').add({
                        nickname: nickname.trim(),
                        name: selectedDrink.name,
                        finalPrice: selectedDrink.price + toppingPrice,
                        ...customization,
                        uid: user.uid,
                        timestamp: Date.now()
                    });
                    setSelectedDrink(null);
                    setCustomization({ sweetness: '完美', ice: '少冰', topping: '無', quantity: 1 });
                } catch (err) {
                    console.error("Submit Error:", err);
                    alert("傳送失敗，請稍後再試。");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleDelete = async (id, uid) => {
                if (uid !== user.uid) {
                    alert("不可以刪除別人的飲料喔！");
                    return;
                }
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').doc(id).delete();
                } catch (err) {
                    console.error("Delete Error:", err);
                }
            };

            const grandTotal = orders.reduce((sum, o) => sum + (o.finalPrice * (o.quantity || 1)), 0);

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto space-y-8 animate-fade-in">
                    {/* Header */}
                    <header className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div className="flex items-center gap-4 mb-4">
                            <div className="w-12 h-12 bg-green-700 rounded-xl flex items-center justify-center text-white">
                                <Icon name="coffee" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black italic text-slate-800">喫茶小舖 光輝店</h1>
                                <p className="text-[10px] text-green-600 font-bold tracking-widest flex items-center gap-1">
                                    <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                    {user ? "已連線至雲端資料庫" : "正在嘗試連線..."}
                                </p>
                            </div>
                        </div>
                        <input 
                            className="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent outline-none font-bold text-lg focus:border-green-200 focus:bg-white transition-all" 
                            placeholder="誰要喝飲料？(請輸入暱稱)" 
                            value={nickname} 
                            onChange={e => setNickname(e.target.value)}
                        />
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        {/* Left: Menu Section */}
                        <div className="space-y-6">
                            <div 
                                ref={scrollRef}
                                onMouseDown={handleMouseDown}
                                onMouseUp={handleMouseUp}
                                onMouseLeave={handleMouseUp}
                                onMouseMove={handleMouseMove}
                                className={`flex gap-2 overflow-x-auto no-scrollbar pb-2 select-none ${dragState.isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                            >
                                {CATEGORIES.map(cat => (
                                    <button 
                                        key={`cat-${cat}`} 
                                        onClick={() => !dragState.moved && setActiveCategory(cat)}
                                        className={`px-6 py-2 rounded-2xl whitespace-nowrap font-black text-sm transition-all duration-200 ${activeCategory === cat ? 'bg-green-700 text-white shadow-md scale-105' : 'bg-white text-slate-500 hover:bg-slate-50'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                            
                            <div className="grid grid-cols-2 gap-3">
                                {BEVERAGES.filter(b => b.category === activeCategory).map(drink => (
                                    <button 
                                        key={`drink-${drink.id}`} 
                                        onClick={() => setSelectedDrink(drink)}
                                        className={`p-4 rounded-3xl bg-white border-2 text-left h-32 flex flex-col justify-between transition-all group ${selectedDrink?.id === drink.id ? 'border-green-600 ring-4 ring-green-50 shadow-md' : 'border-transparent shadow-sm hover:shadow-md'}`}
                                    >
                                        <span className="text-3xl group-hover:scale-110 transition-transform origin-left">{drink.icon}</span>
                                        <div>
                                            <p className="text-sm font-black text-slate-700 leading-tight line-clamp-1">{drink.name}</p>
                                            <p className="text-green-700 font-black">${drink.price}</p>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Right: Customization Section */}
                        <div className="lg:sticky lg:top-8 h-fit">
                            {selectedDrink ? (
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 animate-fade-in">
                                    <div className="flex justify-between items-start mb-6">
                                        <h2 className="text-2xl font-black text-slate-800">{selectedDrink.name}</h2>
                                        <button onClick={() => setSelectedDrink(null)} className="text-slate-300 hover:text-slate-500"><Icon name="xCircle" /></button>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <p className="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">甜度選擇</p>
                                            <div className="flex flex-wrap gap-2">
                                                {SWEETNESS_LEVELS.map(l => (
                                                    <button key={`sweet-${l}`} onClick={() => setCustomization({...customization, sweetness: l})} className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${customization.sweetness === l ? 'bg-slate-800 text-white scale-105 shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>{l}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">冰量選擇</p>
                                            <div className="flex flex-wrap gap-2">
                                                {ICE_LEVELS.map(l => (
                                                    <button key={`ice-${l}`} onClick={() => setCustomization({...customization, ice: l})} className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${customization.ice === l ? 'bg-slate-800 text-white scale-105 shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>{l}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">加料 (+10元)</p>
                                            <div className="flex flex-wrap gap-2">
                                                {TOPPINGS.map(t => (
                                                    <button key={`top-${t.name}`} onClick={() => setCustomization({...customization, topping: t.name})} className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${customization.topping === t.name ? 'bg-green-700 text-white scale-105 shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>{t.name}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-8 flex items-center justify-between border-t border-slate-50 pt-8">
                                        <div className="flex items-center gap-4 bg-slate-50 p-2 rounded-2xl">
                                            <button onClick={() => setCustomization({...customization, quantity: Math.max(1, customization.quantity-1)})} className="w-10 h-10 bg-white rounded-xl font-bold shadow-sm active:scale-90">-</button>
                                            <span className="font-black text-xl w-8 text-center">{customization.quantity}</span>
                                            <button onClick={() => setCustomization({...customization, quantity: customization.quantity+1})} className="w-10 h-10 bg-white rounded-xl font-bold shadow-sm active:scale-90">+</button>
                                        </div>
                                        <button 
                                            onClick={handleSubmitOrder}
                                            disabled={isSubmitting}
                                            className="flex-1 ml-4 bg-green-700 text-white h-14 rounded-2xl font-black text-lg shadow-lg shadow-green-100 hover:bg-green-800 active:scale-95 transition-all disabled:opacity-50 disabled:pointer-events-none"
                                        >
                                            {isSubmitting ? "正在傳送..." : "加入點餐清單"}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-64 border-4 border-dashed border-slate-200 rounded-[2.5rem] flex flex-col items-center justify-center text-slate-300 font-black bg-white/50 space-y-3">
                                    <Icon name="hand" size={48} className="opacity-20 animate-bounce" />
                                    <p>選一杯飲料開始吧！</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Order List */}
                    <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                        <div className="bg-slate-900 p-6 md:p-8 text-white flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="text-center md:text-left">
                                <h2 className="text-xl font-black flex items-center gap-2">
                                    團體點餐統計單 <span className="bg-green-600 text-[10px] px-2 py-0.5 rounded-full">即時更新</span>
                                </h2>
                                <p className="text-xs text-slate-400 mt-1">目前清單內共有 {orders.length} 杯飲品</p>
                            </div>
                            <div className="text-center md:text-right">
                                <p className="text-[10px] text-slate-400 uppercase tracking-tighter">當前預估總額</p>
                                <p className="text-3xl font-black text-green-400">${grandTotal}</p>
                            </div>
                        </div>
                        
                        <div className="divide-y divide-slate-50 max-h-[600px] overflow-y-auto no-scrollbar">
                            {orders.length === 0 ? (
                                <div className="p-20 text-center flex flex-col items-center gap-4">
                                    <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-200">
                                        <Icon name="coffee" size={32} />
                                    </div>
                                    <p className="text-slate-400 font-bold">還沒有人點餐喔，趕快輸入暱稱來一杯吧！</p>
                                </div>
                            ) : (
                                orders.map((o) => (
                                    <div key={o.id} className="p-6 flex justify-between items-center hover:bg-slate-50 transition-colors group">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-green-700 font-black text-lg border border-green-100">
                                                {o.nickname.charAt(0)}
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <span className="font-black text-slate-800">{o.nickname}</span>
                                                    <span className="text-[10px] px-2 py-0.5 bg-slate-100 text-slate-500 rounded-md font-bold">x{o.quantity || 1}</span>
                                                </div>
                                                <p className="text-xs font-medium text-slate-500 mt-0.5">
                                                    {o.name} <span className="text-slate-300 mx-1">/</span> {o.sweetness} <span className="text-slate-300 mx-1">/</span> {o.ice}
                                                    {o.topping !== '無' && <span className="ml-1 text-green-600 font-bold underline decoration-green-200 underline-offset-2">+{o.topping}</span>}
                                                </p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="text-right">
                                                <p className="font-black text-lg text-slate-700">${o.finalPrice * (o.quantity || 1)}</p>
                                                <p className="text-[9px] text-slate-300 font-mono">{new Date(o.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                            </div>
                                            {user && o.uid === user.uid && (
                                                <button 
                                                    onClick={() => handleDelete(o.id, o.uid)} 
                                                    className="text-slate-200 hover:text-red-500 p-2 hover:bg-red-50 rounded-xl transition-all"
                                                    title="刪除此訂單"
                                                >
                                                    <Icon name="trash" size={18} />
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
