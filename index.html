<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 喫茶小舖 - 團購點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f1ea; }
        .menu-card:hover { transform: translateY(-2px); transition: all 0.2s; }
        .sticky-summary { position: sticky; bottom: 0; background: white; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0d9488; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">
    <div id="app" class="max-w-4xl mx-auto p-4">
        <!-- Header -->
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-teal-800">喫茶小舖 - 辦公室點餐</h1>
            <p class="text-gray-600 mt-2">來店買五送一 · 外送買十送一</p>
        </header>

        <!-- Order Form Section -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-xl font-bold mb-4 border-b pb-2 text-teal-700">1. 開始點餐</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">點餐人姓名</label>
                    <input type="text" id="userName" class="mt-1 block w-full border rounded-md p-2" placeholder="請輸入姓名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">選擇品項</label>
                    <select id="drinkSelect" class="mt-1 block w-full border rounded-md p-2" onchange="updatePrice()">
                        <!-- 菜單由 JS 動態載入 -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">甜度</label>
                    <select id="sugar" class="mt-1 block w-full border rounded-md p-2">
                        <option>正常</option><option>七分</option><option>半糖</option><option>微糖</option><option>二分</option><option>無糖</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">冰塊</label>
                    <select id="ice" class="mt-1 block w-full border rounded-md p-2">
                        <option>正常冰</option><option>少冰</option><option>微冰</option><option>去冰</option><option>常溫</option><option>溫熱</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">加料 (+10元)</label>
                    <select id="topping" class="mt-1 block w-full border rounded-md p-2" onchange="updatePrice()">
                        <option value="0">不加料</option>
                        <option value="10">小麥可可脆球</option>
                        <option value="10">黑糖珍珠</option>
                        <option value="10">迷你黑糖珍珠</option>
                        <option value="10">嫩仙草凍</option>
                        <option value="10">島嶼椰果</option>
                        <option value="10">纖果</option>
                        <option value="10">琥珀Q凍</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="addBtn" onclick="addToOrder()" class="w-full bg-teal-600 text-white font-bold py-2 px-4 rounded-md hover:bg-teal-700 transition disabled:bg-gray-400">
                        <span id="btnText">加入點餐清單 (NT$ <span id="currentPriceDisplay">0</span>)</span>
                    </button>
                </div>
            </div>
            <p id="syncStatus" class="mt-2 text-xs text-center text-gray-400"></p>
        </div>

        <!-- Orders Record -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold text-teal-700">2. 點餐紀錄</h2>
                <button onclick="clearAll()" class="text-red-500 text-sm hover:underline">清空全部</button>
            </div>
            <div id="orderList" class="space-y-3">
                <p class="text-gray-400 text-center py-4">目前尚無點餐紀錄</p>
            </div>
        </div>

        <!-- Summary & Actions -->
        <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center max-w-4xl mx-auto z-50">
            <div>
                <span class="text-gray-600">總計：</span>
                <span class="text-2xl font-bold text-red-600" id="totalPrice">NT$ 0</span>
                <span class="ml-2 text-sm text-gray-500" id="totalCount">(0 杯)</span>
            </div>
            <button onclick="generateLineMessage()" class="bg-green-500 text-white px-6 py-2 rounded-full font-bold hover:bg-green-600 shadow-lg flex items-center">
                生成 LINE 訂單格式
            </button>
        </div>
    </div>

    <!-- Modal for LINE message -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <h3 class="text-lg font-bold mb-4">LINE 訂單格式 (點擊複製)</h3>
            <textarea id="lineContent" class="w-full h-64 border p-2 text-sm font-mono mb-4 bg-gray-50"></textarea>
            <div class="flex gap-2">
                <button onclick="copyLineMessage()" class="flex-1 bg-green-500 text-white py-2 rounded">複製內容</button>
                <button onclick="toggleModal(false)" class="flex-1 bg-gray-200 py-2 rounded">關閉</button>
            </div>
        </div>
    </div>

    <script>
        // 設定 Google Script URL
        const DEPLOY_ID = "AKfycbx6LndO5m-G5Fw-I_P1QSX1DMn1v6ESW4ea0gF3mOmnSd0ojIegyyQTyCrxD0VEpOQBZPCTN7qX"; // 更新後的 ID
        const SCRIPT_URL = `https://script.google.com/macros/s/${DEPLOY_ID}/exec`;

        const menu = [
            { category: "冬季限定", items: [
                { name: "仙草見泥", price: 75 }, { name: "芋泥奶奶", price: 75 }, { name: "芋泥波波", price: 75 },
                { name: "黑糖薑茶", price: 45 }, { name: "薑汁撞奶", price: 55 }, { name: "薑汁歐蕾", price: 60 },
                { name: "薑汁仙甘", price: 48 }, { name: "薑汁燒仙草", price: 55 }
            ]},
            { category: "私房特調", items: [
                { name: "綠茶好芒/青茶好芒(L)", price: 55 }, { name: "香橙茉綠/百香茉綠(L)", price: 55 },
                { name: "香橙多多/百香多多(L)", price: 60 }, { name: "蜜桃桂花烏龍(L)", price: 55 },
                { name: "茉綠多多(L)", price: 55 }, { name: "翡翠檸檬綠(L)", price: 60 }, { name: "初見青梅(L)", price: 50 }
            ]},
            { category: "喫茶必喝", items: [
                { name: "哞³-清爽版", price: 69 }, { name: "哞³-重乳版", price: 69 },
                { name: "重乳咖紅", price: 60 }, { name: "重乳烏龍", price: 60 },
                { name: "阿君珍珠奶茶", price: 50 }, { name: "黑糖波波鮮奶", price: 60 }, { name: "黑哞", price: 65 }
            ]},
            { category: "原葉手煮茶", items: [
                { name: "桂花烏龍(L)", price: 35 }, { name: "韻焙烏龍(L)", price: 35 },
                { name: "經典咖啡紅茶(L)", price: 35 }, { name: "青山茉綠(L)", price: 35 },
                { name: "文山青茶(L)", price: 35 }, { name: "烏瓦莊園紅茶(L)", price: 35 }
            ]},
            { category: "奶茶系列", items: [
                { name: "牛奶糖奶蓋茶(L)", price: 60 }, { name: "珍珠烏瓦奶茶(L)", price: 55 },
                { name: "烏瓦奶茶(L)", price: 55 }, { name: "琥珀桂花奶茶(L)", price: 60 },
                { name: "韻焙烏龍歐蕾(L)", price: 65 }, { name: "嫩仙草紅茶歐蕾(L)", price: 70 }
            ]}
        ];

        let orders = JSON.parse(localStorage.getItem('teaOrders') || '[]');

        function initMenu() {
            const select = document.getElementById('drinkSelect');
            let html = '<option value="" disabled selected>請選擇飲料</option>';
            menu.forEach(cat => {
                html += `<optgroup label="${cat.category}">`;
                cat.items.forEach(item => {
                    html += `<option value="${item.name}" data-price="${item.price}">${item.name} - $${item.price}</option>`;
                });
                html += `</optgroup>`;
            });
            select.innerHTML = html;
        }

        function updatePrice() {
            const select = document.getElementById('drinkSelect');
            const topping = parseInt(document.getElementById('topping').value);
            const selectedOption = select.options[select.selectedIndex];
            if (selectedOption && !selectedOption.disabled) {
                const basePrice = parseInt(selectedOption.getAttribute('data-price'));
                document.getElementById('currentPriceDisplay').innerText = basePrice + topping;
            }
        }

        async function addToOrder() {
            const user = document.getElementById('userName').value.trim();
            const select = document.getElementById('drinkSelect');
            const sugar = document.getElementById('sugar').value;
            const ice = document.getElementById('ice').value;
            const toppingValue = parseInt(document.getElementById('topping').value);
            const toppingName = document.getElementById('topping').options[document.getElementById('topping').selectedIndex].text;
            const addBtn = document.getElementById('addBtn');
            const statusText = document.getElementById('syncStatus');

            if (!user) return alert("請輸入點餐人姓名！");
            if (!select.value) return alert("請選擇飲品！");

            const selectedOption = select.options[select.selectedIndex];
            const basePrice = parseInt(selectedOption.getAttribute('data-price'));
            
            const newOrder = {
                id: Date.now(),
                user,
                drink: select.value,
                sugar,
                ice,
                topping: toppingValue > 0 ? toppingName : "無",
                price: basePrice + toppingValue
            };

            // 先更新本地 UI
            orders.push(newOrder);
            saveAndRender();

            // 嘗試同步到 Google Sheets
            addBtn.disabled = true;
            statusText.innerHTML = '<span class="loading-spinner"></span> 正在同步至試算表...';
            
            try {
                // 使用 JSONP 或 Fetch 搭配 mode: 'no-cors' 視 Script 寫法而定
                // 這裡推薦標準 fetch 搭配 Google Apps Script 的 doPost
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 處理跨網域
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newOrder)
                });
                statusText.innerText = "✅ 已成功同步到雲端資料庫";
                setTimeout(() => { statusText.innerText = ""; }, 3000);
            } catch (e) {
                console.error(e);
                statusText.innerText = "❌ 雲端同步失敗，但已保存在本地";
            } finally {
                addBtn.disabled = false;
            }
            
            select.selectedIndex = 0;
            document.getElementById('topping').selectedIndex = 0;
            updatePrice();
        }

        function deleteOrder(id) {
            orders = orders.filter(o => o.id !== id);
            saveAndRender();
        }

        function editOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;
            document.getElementById('userName').value = order.user;
            document.getElementById('drinkSelect').value = order.drink;
            document.getElementById('sugar').value = order.sugar;
            document.getElementById('ice').value = order.ice;
            deleteOrder(id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearAll() {
            if(confirm("確定要清空所有紀錄嗎？（注意：這不會影響已上傳到 Google Sheet 的資料）")) {
                orders = [];
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('teaOrders', JSON.stringify(orders));
            renderOrders();
        }

        function renderOrders() {
            const list = document.getElementById('orderList');
            const totalDisplay = document.getElementById('totalPrice');
            const countDisplay = document.getElementById('totalCount');
            
            if (orders.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center py-4">目前尚無點餐紀錄</p>';
                totalDisplay.innerText = "NT$ 0";
                countDisplay.innerText = "(0 杯)";
                return;
            }

            let html = "";
            let total = 0;
            orders.forEach(o => {
                total += o.price;
                html += `
                <div class="flex justify-between items-center p-3 border rounded-lg bg-gray-50 hover:bg-gray-100">
                    <div class="flex-1">
                        <span class="font-bold text-teal-800">${o.user}</span>: 
                        <span class="text-gray-800">${o.drink}</span> 
                        <span class="text-xs bg-white border px-1 rounded text-gray-500">${o.sugar}/${o.ice}</span>
                        ${o.topping !== "無" ? `<span class="text-xs text-orange-600 font-bold">+${o.topping}</span>` : ""}
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold shrink-0">$${o.price}</span>
                        <div class="flex gap-2">
                            <button onclick="editOrder(${o.id})" class="text-blue-500 text-sm">編輯</button>
                            <button onclick="deleteOrder(${o.id})" class="text-red-500 text-sm">刪除</button>
                        </div>
                    </div>
                </div>`;
            });

            list.innerHTML = html;
            totalDisplay.innerText = `NT$ ${total}`;
            countDisplay.innerText = `(${orders.length} 杯)`;
        }

        function generateLineMessage() {
            if (orders.length === 0) return alert("目前還沒有點餐資料喔！");
            
            let msg = "🥤 喫茶小舖 團購訂單\n";
            msg += "====================\n";
            
            const summary = {};
            orders.forEach(o => {
                const key = `${o.drink} (${o.sugar}/${o.ice}${o.topping !== "無" ? ` +${o.topping}` : ""})`;
                summary[key] = (summary[key] || 0) + 1;
            });

            for (const [desc, qty] of Object.entries(summary)) {
                msg += `${desc} x ${qty}\n`;
            }

            msg += "====================\n";
            msg += `總計：${orders.length} 杯 / NT$ ${orders.reduce((a,b) => a + b.price, 0)}\n\n`;
            msg += "【點餐明細】\n";
            orders.forEach((o, i) => {
                msg += `${i+1}. ${o.user}: ${o.drink}(${o.sugar}/${o.ice}${o.topping !== "無" ? `+${o.topping}`: ""})\n`;
            });

            document.getElementById('lineContent').value = msg;
            toggleModal(true);
        }

        function toggleModal(show) {
            document.getElementById('modal').classList.toggle('hidden', !show);
        }

        function copyLineMessage() {
            const textArea = document.getElementById('lineContent');
            textArea.select();
            document.execCommand('copy');
            alert("已複製到剪貼簿，快貼給老闆吧！");
        }

        window.onload = () => {
            initMenu();
            renderOrders();
        };
    </script>
</body>
</html>
